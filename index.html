<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Taxi Plzeň</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

<h1 class="text-2xl font-bold mb-6">Admin Panel - Taxi Plzeň</h1>

<!-- LOGIN -->
<div id="loginSection" class="max-w-md space-y-4">
<input id="email" type="email" placeholder="Email"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">
<input id="password" type="password" placeholder="Password"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">
<button onclick="login()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded">
Přihlásit se
</button>
<p id="loginError" class="text-red-400"></p>
</div>

<!-- ADMIN -->
<div id="adminSection" class="hidden">

<div class="flex gap-4 mb-6">
<button onclick="showActive()"
class="bg-yellow-500 text-black px-4 py-2 rounded">
Aktivní jízdy
</button>
<button onclick="showHistory()"
class="bg-gray-700 px-4 py-2 rounded">
Historie
</button>
<button onclick="logout()"
class="bg-red-500 px-4 py-2 rounded ml-auto">
Odhlásit se
</button>
</div>

<div id="ridesList" class="space-y-4"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
  authDomain: "taxi-kristian.firebaseapp.com",
  projectId: "taxi-kristian",
  storageBucket: "taxi-kristian.firebasestorage.app",
  messagingSenderId: "872925880546",
  appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginSection = document.getElementById("loginSection");
const adminSection = document.getElementById("adminSection");
const ridesList = document.getElementById("ridesList");

let currentView = "active";
let knownRideIds = [];
const notificationSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

window.login = async function() {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {
await signInWithEmailAndPassword(auth, email, password);
} catch (error) {
document.getElementById("loginError").innerText = "Chyba přihlášení";
}
};

window.logout = function() {
signOut(auth);
};

window.showActive = function() {
currentView = "active";
loadRides();
};

window.showHistory = function() {
currentView = "history";
loadRides();
};

onAuthStateChanged(auth, user => {
if(user) {
loginSection.classList.add("hidden");
adminSection.classList.remove("hidden");
loadRides();
} else {
loginSection.classList.remove("hidden");
adminSection.classList.add("hidden");
}
});

function loadRides() {

onSnapshot(collection(db, "rides"), snapshot => {

snapshot.docChanges().forEach(change => {
if (change.type === "added") {
const newRide = change.doc.data();
if (newRide.status === "new") {
notificationSound.play().catch(() => {});
}
}
});

ridesList.innerHTML = "";

snapshot.forEach(docSnap => {

const ride = docSnap.data();
const rideId = docSnap.id;

if(currentView === "active" && ride.status === "completed") return;
if(currentView === "history" && ride.status !== "completed") return;

const rideDiv = document.createElement("div");

if (ride.status === "new") {
rideDiv.className = "bg-yellow-600 p-4 rounded";
}
else if (ride.status === "confirmed") {
rideDiv.className = "bg-blue-600 p-4 rounded";
}
else {
rideDiv.className = "bg-gray-700 p-4 rounded";
}

rideDiv.innerHTML = `
<p><strong>Odkud:</strong> ${ride.pickup}</p>
<p><strong>Kam:</strong> ${ride.destination}</p>
<p><strong>Telefon:</strong> ${ride.phone}</p>
<p><strong>Status:</strong> ${ride.status}</p>
`;

if(currentView === "active") {

const btn = document.createElement("button");

if (ride.status === "new") {
btn.innerText = "Potvrdit";
btn.className = "mt-2 bg-green-500 px-3 py-1 rounded";
btn.onclick = () => updateDoc(doc(db, "rides", rideId), { status: "confirmed" });
}

if (ride.status === "confirmed") {
btn.innerText = "Dokončit";
btn.className = "mt-2 bg-gray-900 px-3 py-1 rounded";
btn.onclick = () => updateDoc(doc(db, "rides", rideId), { status: "completed" });
}

rideDiv.appendChild(btn);
}

ridesList.appendChild(rideDiv);

});

});
}

</script>

</body>
</html>
