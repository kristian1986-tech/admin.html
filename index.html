.normalize("NFD")

/* DASHBOARD */

async function loadDashboard(){
const snapshot = await getDocs(collection(db,"receipts"));
let todayTotal=0, monthTotal=0;
const now=new Date();

snapshot.forEach(docSnap=>{
const data=docSnap.data();
if(!data.date) return;
const date=new Date(data.date.seconds*1000);

if(date.toDateString()===now.toDateString())
todayTotal+=data.price||0;

if(date.getMonth()===now.getMonth() &&
date.getFullYear()===now.getFullYear())
monthTotal+=data.price||0;
});

document.getElementById("todayTotal").innerText = todayTotal+" Kč";
document.getElementById("monthTotal").innerText = monthTotal+" Kč";
}

/* RESTUL CODULUI TĂU – IDENTIC */

async function generateReceiptNumber(){
  
const year=new Date().getFullYear();
const counterRef=doc(db,"counters","receipts_"+year);

return await runTransaction(db,async(transaction)=>{
const counterDoc=await transaction.get(counterRef);
let newNumber=1;
if(counterDoc.exists())
newNumber=counterDoc.data().lastNumber+1;

transaction.set(counterRef,{lastNumber:newNumber},{merge:true});
return `${year}-${String(newNumber).padStart(4,"0")}`;
});
}

async function completeRide(ride){
const receiptNumber=await generateReceiptNumber();
const receiptDate=new Date();

await updateDoc(doc(db,"rides",ride.id),{
status:"completed",
receiptNumber,
receiptDate
});

await addDoc(collection(db,"receipts"),{
receiptNumber,
date:receiptDate,
pickup:ride.pickup,
destination:ride.destination,
distance:ride.distance,
price:ride.estimatedPrice||0,
phone:ride.phone||""
});

alert("Účtenka vytvořena: "+receiptNumber);
loadDashboard();
}


function loadRides(){

const selectedDriver = driverFilter.value;

const ridesQuery = query(
  collection(db,"rides"),
  orderBy("createdAt","desc")
);

getDocs(ridesQuery).then(snapshot=>{

ridesList.innerHTML="";

  
snapshot.forEach(docSnap=>{
  
const ride={id:docSnap.id,...docSnap.data()};

if(currentView==="active" &&
(ride.status==="completed"||ride.status==="rejected"||ride.status==="cancelled")) return;

if(currentView==="history" &&
(ride.status==="new"||ride.status==="confirmed"||ride.status==="arrived")) return;

const rideDiv=document.createElement("div");
rideDiv.className="bg-gray-700 p-4 rounded";

rideDiv.innerHTML=`
<p><strong>Odkud:</strong> ${ride.pickup}</p>
<p><strong>Kam:</strong> ${ride.destination}</p>
<p><strong>Řidič:</strong> ${ride.driverName || "-"}</p>
<p><strong>Status:</strong> ${ride.status}</p>

${ride.status==="completed" && ride.receiptDate ? `
<p class="text-gray-300">
<strong>Dokončeno:</strong> 
${new Date(ride.receiptDate.seconds * 1000).toLocaleString("cs-CZ")}
</p>
` : ""}

${ride.eta ? `<p><strong>ETA:</strong> ${ride.eta} min</p>` : ""}
`;

if(ride.receiptNumber){
const receiptBtn=document.createElement("button");
receiptBtn.className="mt-3 bg-green-600 px-4 py-2 rounded";
receiptBtn.innerText="📄 Účtenka "+ride.receiptNumber;
receiptBtn.onclick=()=>generateAdminPDF(ride);
rideDiv.appendChild(receiptBtn);
}

/* NEW */
if(currentView==="active" && ride.status==="new"){

  rideSound.play().catch(()=>{});
  
const etaInput=document.createElement("input");
etaInput.type="number";
etaInput.placeholder="Minuty";
etaInput.className="mt-3 p-2 w-20 text-black rounded mr-2";

const confirmBtn=document.createElement("button");
confirmBtn.innerText="Potvrdit";
confirmBtn.className="mt-3 bg-green-600 px-4 py-2 rounded mr-2";
confirmBtn.onclick=()=>{
rideSound.pause();
rideSound.currentTime = 0;

updateDoc(doc(db,"rides",ride.id),{
status:"confirmed",
eta:parseInt(etaInput.value)||5
});
};

const rejectBtn=document.createElement("button");
rejectBtn.innerText="Odmítnout";
rejectBtn.className="mt-3 bg-red-600 px-4 py-2 rounded";
rejectBtn.onclick=()=>{
rideSound.pause();
rideSound.currentTime = 0;

updateDoc(doc(db,"rides",ride.id),{status:"rejected"});
};

rideDiv.appendChild(etaInput);
rideDiv.appendChild(confirmBtn);
rideDiv.appendChild(rejectBtn);
}

/* CONFIRMED */
if(currentView==="active" && ride.status==="confirmed"){
const arrivedBtn=document.createElement("button");
arrivedBtn.innerText="Řidič přijel";
arrivedBtn.className="mt-3 bg-blue-600 px-4 py-2 rounded";
arrivedBtn.onclick=()=>{
updateDoc(doc(db,"rides",ride.id),{status:"arrived"});
};

rideDiv.appendChild(arrivedBtn);
}

if(currentView==="active" && ride.status==="arrived"){
const startBtn=document.createElement("button");
startBtn.innerText="Zahájit jízdu";
startBtn.className="mt-3 bg-yellow-500 text-black px-4 py-2 rounded mr-2";
startBtn.onclick=()=>{

updateDoc(doc(db,"rides",ride.id),{status:"in_progress"});

startDriverGPS(ride.id);

/* deschide Google Maps automat */
const url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(ride.destination);
window.open(url,"_blank");

};

rideDiv.appendChild(startBtn);
}

if(currentView==="active" && ride.status==="in_progress"){
const finishBtn=document.createElement("button");
finishBtn.innerText="Dokončit";
finishBtn.className="mt-3 bg-green-600 px-4 py-2 rounded";
finishBtn.onclick=()=>{
showPrice(ride.estimatedPrice || 0);
completeRide(ride);
};
rideDiv.appendChild(finishBtn);
}

ridesList.appendChild(rideDiv);
});
});

  function showPrice(price){

const popup = document.getElementById("pricePopup");
const text = document.getElementById("priceText");

text.classList.remove("price-zoom");
void text.offsetWidth; 
text.classList.add("price-zoom");

text.innerText = price + " Kč";

popup.classList.remove("hidden");

popup.onclick = ()=>{
popup.classList.add("hidden");
};

  }
  
function startDriverGPS(rideId){

navigator.geolocation.watchPosition((pos)=>{

updateDoc(doc(db,"rides",rideId),{
driverLat: pos.coords.latitude,
driverLng: pos.coords.longitude
});

});

}  

document.getElementById("driverStatsSelect").addEventListener("change", async function(){

const driverName = this.value;

if(!driverName) return;

const snap = await getDocs(collection(db,"rides"));

let today=0, month=0, year=0;
  
let todayCount = 0;
let monthCount = 0;
let yearCount = 0;
  
const now = new Date();

  
snap.forEach(docSnap=>{

const ride = docSnap.data();

// 🔥 FOLOSIM driverName (nu driverId)
if(ride.driverName !== driverName) return;

if(ride.status !== "completed") return;

// 🔥 fallback dacă nu există receiptDate

if(ride.receiptDate){
date = new Date(ride.receiptDate.seconds * 1000);
}else if(ride.createdAt){
date = new Date(ride.createdAt.seconds * 1000);
}else{
return;
}

const price = ride.estimatedPrice || 0;

// TODAY
if(date.toDateString() === now.toDateString()){
today += price;
todayCount++;  
}

// MONTH
if(date.getMonth() === now.getMonth() &&
   date.getFullYear() === now.getFullYear()){
month += price;
monthCount++;
}

// YEAR
if(date.getFullYear() === now.getFullYear()){
year += price;
yearCount++;
}

});

document.getElementById("driverToday").innerText =
  today + " Kč (" + todayCount + " jízd)";

document.getElementById("driverMonth").innerText =
  month + " Kč (" + monthCount + " jízd)";

document.getElementById("driverYear").innerText =
  year + " Kč (" + yearCount + " jízd)";
  
});

window.exportMonthly = async function(){

const driverId = driverFilter.value;
const monthValue = document.getElementById("exportMonth").value;

if(driverId === "all"){
alert("Vyberte řidiče");
return;
}

if(!monthValue){
alert("Vyberte měsíc");
return;
}

const [year,month] = monthValue.split("-");
const snap = await getDocs(collection(db,"rides"));

const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

let y = 20;
let total = 0;

let driverName = "-";
let driverIco = "-";

// 🔥 luăm date șofer
snap.forEach(doc=>{
const d = doc.data();
if(d.driverId === driverId){
if(d.driverName) driverName = d.driverName;
if(d.driverIco) driverIco = d.driverIco;
}
});

// HEADER
pdf.setFontSize(18);
pdf.text("COBRA",105,y,{align:"center"});
y += 6;

pdf.setFontSize(10);
pdf.text("preprava osob Plzen",105,y,{align:"center"});
y += 6;

pdf.text("Prehled jizd - mesicni",105,y,{align:"center"});
y += 10;

// DRIVER
pdf.text("Jméno: " + driverName,20,y);
y += 6;
pdf.text("ICO: " + driverIco,20,y);
y += 10;

// TABLE HEADER
pdf.setFontSize(11);
pdf.text("Datum",20,y);
pdf.text("Odkud",55,y);
pdf.text("Kam",120,y);
pdf.text("Cena",180,y,{align:"right"});
y += 4;

pdf.line(20,y,190,y);
y += 6;

// DATA
snap.forEach(docSnap=>{

const ride = docSnap.data();

if(ride.driverId !== driverId) return;
if(ride.status !== "completed") return;

let date;
if(ride.receiptDate){
date = new Date(ride.receiptDate.seconds * 1000);
}else if(ride.createdAt){
date = new Date(ride.createdAt.seconds * 1000);
}else return;

if(date.getFullYear()!=year || (date.getMonth()+1)!=parseInt(month)) return;

const price = Number(ride.estimatedPrice) || 0;
total += price;

pdf.text(fixText(date.toLocaleDateString("cs-CZ")),20,y);
const pickupLines = pdf.splitTextToSize(fixText(ride.pickup || ""), 60);
const destLines = pdf.splitTextToSize(fixText(ride.destination || ""), 60);

pdf.text(pickupLines,55,y);
pdf.text(destLines,120,y);
pdf.text(price + " Kc",180,y,{align:"right"});

  
const lines = Math.max(pickupLines.length, destLines.length);
y += lines * 6;

if(y > 270){
pdf.addPage();
y = 20;
}

});

// TOTAL
y += 5;
pdf.line(20,y,190,y);
y += 8;

pdf.setFontSize(12);
pdf.text("CELKEM: " + total + " Kc",180,y,{align:"right"});

pdf.save("mesic_" + driverName + ".pdf");

};

window.openYearPicker = function(){

  const list = document.getElementById("yearList");
  list.innerHTML = "";

  const start = 2000;
  const end = 2200;

  for(let i = end; i >= start; i--){

    const div = document.createElement("div");
    div.className = "h-12 flex items-center justify-center snap-center";

    div.innerText = i;

    list.appendChild(div);
  }

  // scroll la anul curent
  setTimeout(()=>{
    const index = end - selectedYearTemp;
    list.scrollTop = index * 48;
  },100);

  // detect scroll
  list.onscroll = ()=>{

  const itemHeight = 48;
  const containerHeight = 192; // h-48 = 192px

  const centerOffset = (containerHeight / 2) - (itemHeight / 2);

  const index = Math.round((list.scrollTop + centerOffset) / itemHeight);

  selectedYearTemp = end - index;
  }
  
  document.getElementById("yearPicker").classList.remove("hidden");
}
  

window.confirmYear = function(){
  document.getElementById("yearButton").innerText = selectedYearTemp;
  document.getElementById("yearPicker").classList.add("hidden");
}
  

window.toggleSpamPanel = function(){

  const panel = document.getElementById("spamPanel");

  if(panel.classList.contains("hidden")){
    panel.classList.remove("hidden");
    loadSpamRides();
  } else {
    panel.classList.add("hidden");
  }

}


async function loadSpamRides(){

  const container = document.getElementById("spamList");
  container.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"rides"));

  const spamMap = {};

  snap.forEach(docSnap => {

    const ride = docSnap.data();

    if(ride.status !== "cancelled") return;

    const key = ride.phone || ride.deviceId;

    if(!spamMap[key]){
      spamMap[key] = {
        phone: ride.phone,
        deviceId: ride.deviceId,
        count: 0
      };
    }

    spamMap[key].count++;

  });

  container.innerHTML = "";

  Object.values(spamMap).forEach(item => {

    const div = document.createElement("div");
    div.className = "bg-gray-800 p-4 rounded";

 div.innerHTML = `
  <p>📱 ${item.phone || "-"}</p>
  <p class="text-gray-400 text-xs">${item.deviceId}</p>
  <p class="text-red-400 mb-2">❌ Anulări: ${item.count}</p>

  <div class="flex gap-2 flex-wrap">
    <button class="blockBtn bg-red-600 px-3 py-2 rounded">
      🚫 Block
    </button>

    <button class="unblockBtn bg-green-600 px-3 py-2 rounded">
      🔓 Unblock
    </button>

    <button class="deleteBtn bg-gray-600 px-3 py-2 rounded">
      🗑️ Delete
    </button>
  </div>
`;
    

// 🚫 BLOCK
div.querySelector(".blockBtn").onclick = async () => {

  await addDoc(collection(db,"blacklist"),{
    phone: item.phone || null,
    deviceId: item.deviceId || null,
    createdAt: new Date()
  });

  alert("Zablokováno ✅");
};

// 🔓 UNBLOCK
div.querySelector(".unblockBtn").onclick = async () => {

  const snap = await getDocs(collection(db,"blacklist"));

  snap.forEach(async (docSnap) => {
    const data = docSnap.data();

    if(
      data.phone === item.phone ||
      data.deviceId === item.deviceId
    ){
      await deleteDoc(doc(db,"blacklist", docSnap.id));
    }
  });

  alert("Odblokováno ✅");
};

// 🗑️ DELETE DIN LISTĂ (doar UI)
div.querySelector(".deleteBtn").onclick = () => {
  div.remove();
};

    container.appendChild(div);

  });

}


window.toggleSupportPanel = function(){

  const panel = document.getElementById("supportPanel");

  if(panel.classList.contains("hidden")){
    panel.classList.remove("hidden");

    // 🔥 PORNEȘTE LISTA
    listenSupportChats();

  }else{
    panel.classList.add("hidden");
  }

};
  

setTimeout(()=>{
  const panel = document.getElementById("supportPanel");

  if(panel){
    panel.addEventListener("click",(e)=>{
      if(e.target.id === "supportPanel"){
        panel.classList.add("hidden");
      }
    });
  }
},500);


function listenSupportChats(){

  const list = document.getElementById("supportList");

  onSnapshot(
    query(
      collection(db,"supportChats"),
     orderBy("updatedAt","desc")
    ),
    snapshot=>{

      list.innerHTML = "";

      snapshot.forEach(docSnap=>{

        const chat = docSnap.data();
        const chatId = docSnap.id;

        const div = document.createElement("div");

        div.className = "bg-gray-700 p-3 rounded-xl cursor-pointer active:scale-95 transition";

        div.innerHTML = `
          <div class="text-sm font-semibold">
            📱 ${chat.phone || "Client"}
          </div>
          <div class="text-xs text-gray-300">
            ${chat.lastMessage || "Žádná zpráva"}
          </div>
        `;

        // 🔥 CLICK → deschide chat (pasul 3)

div.onclick = ()=>{

  const chatBox = document.getElementById("supportChatBox");

if(currentSupportChatId === chatId && !chatBox.classList.contains("hidden")){
  chatBox.classList.add("hidden");

  // 🔥 IMPORTANT
  currentSupportChatId = null;

  return;
}
  
  openSupportChat(chatId);

}; 

        list.appendChild(div);

      });

    }
  );
}


let currentSupportChatId = null;

  
function openSupportChat(chatId){

  const chatBox = document.getElementById("supportChatBox");

  // 🔥 dacă e deja același chat → nu mai porni listener din nou
  if(currentSupportChatId === chatId){
    return;
  }

  currentSupportChatId = chatId;

  chatBox.classList.remove("hidden");

  listenSupportMessages(chatId);
}


  
function listenSupportMessages(chatId){

  const box = document.getElementById("supportMessages");

  onSnapshot(
    query(
      collection(db,"supportChats",chatId,"messages"),
      orderBy("createdAt","asc")
    ),
    snapshot=>{

      box.innerHTML = "";

      snapshot.forEach(docSnap=>{
        const msg = docSnap.data();

        const div = document.createElement("div");

        div.innerText = msg.text;

        if(msg.sender === "admin"){
          div.className = "bg-blue-600 p-2 rounded-xl ml-auto mb-1 max-w-[70%]";
        }else{
          div.className = "bg-gray-700 p-2 rounded-xl mr-auto mb-1 max-w-[70%]";
        }

        box.appendChild(div);
      });

      box.scrollTop = box.scrollHeight;

    }
  );
}



async function sendSupportReply(){

  const input = document.getElementById("supportInput");
  const text = input.value.trim();

  if(!text || !currentSupportChatId) return;

  // 🔥 trimite mesaj
  await addDoc(
    collection(db,"supportChats",currentSupportChatId,"messages"),
    {
      text: text,
      sender: "admin",
      createdAt: serverTimestamp()
    }
  );

  // 🔥 UPDATE LIST (IMPORTANT)
  await updateDoc(
    doc(db,"supportChats",currentSupportChatId),
    {
      lastMessage: text,
      updatedAt: serverTimestamp()
    }
  );

  input.value = "";
}

window.sendSupportReply = sendSupportReply;
  
  
</script>
