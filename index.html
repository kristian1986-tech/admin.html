<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Taxi Plzeň</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- 🔥 ADAUGAT: jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
<style>

@keyframes priceZoom {
0%{
transform: scale(0.4);
opacity:0;
text-shadow:0 0 0px #00ff88;
}

60%{
transform: scale(1.15);
opacity:1;
text-shadow:0 0 35px #00ff88;
}

100%{
transform: scale(1);
text-shadow:0 0 20px #00ff88;
}
}

.price-zoom{
animation: priceZoom 0.6s ease-out;
}

</style>
  
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

<audio id="rideSound" loop>
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>
  
<h1 class="text-2xl font-bold mb-6">Admin Panel - Taxi Plzeň</h1>

<div id="loginSection" class="max-w-md space-y-4">
<input id="email" type="email" placeholder="Email"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">
<input id="password" type="password" placeholder="Password"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">
<button onclick="login()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded">
Přihlásit se
</button>
<p id="loginError" class="text-red-400"></p>
</div>

<div id="adminSection" class="hidden">

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
<div class="bg-gray-800 p-4 rounded">
<p class="text-gray-400">💰 Dnes</p>
<p id="todayTotal" class="text-2xl font-bold text-green-400">0 Kč</p>
</div>
<div class="bg-gray-800 p-4 rounded">
<p class="text-gray-400">📅 Tento měsíc</p>
<p id="monthTotal" class="text-2xl font-bold text-yellow-400">0 Kč</p>
</div>
</div>

<div class="flex gap-4 mb-6 items-center flex-wrap">
<button onclick="showActive()" class="bg-yellow-500 text-black px-4 py-2 rounded">
Aktivní jízdy
</button>
<button onclick="showHistory()" class="bg-gray-700 px-4 py-2 rounded">
Historie
</button>
<input type="month" id="exportMonth"
class="bg-gray-800 border border-gray-600 px-3 py-2 rounded">
<button onclick="exportMonthly()" class="bg-green-600 px-4 py-2 rounded">
Exportovat měsíc
</button>
<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded ml-auto">
Odhlásit se
</button>
</div>

<div id="ridesList" class="space-y-4"></div>
</div>

  <div id="pricePopup"
class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50">

<div id="priceText"
class="text-7xl font-extrabold text-green-400 price-zoom">
0 Kč
</div>

  </div>
  
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, runTransaction, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
authDomain: "taxi-kristian.firebaseapp.com",
projectId: "taxi-kristian",
storageBucket: "taxi-kristian.firebasestorage.app",
messagingSenderId: "872925880546",
appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
  const auth = getAuth(app);

import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

const messaging = getMessaging(app);

Notification.requestPermission().then((permission)=>{
if(permission === "granted"){

getToken(messaging,{
vapidKey:"BNjO8QUOa0ncoJsS_XsEwYeWzwYzskAkbPGaMlDv4WOgvWXKQmsEMhKluwF_yPYxYkBKZqpDx05ERWQp2DI7-Ck"
}).then((token)=>{
console.log("Driver token:",token);
});

}
});
const rideSound = document.getElementById("rideSound");
let currentView = "active";

/* LOGIN */

window.login = async function() {
try {
await signInWithEmailAndPassword(auth,email.value,password.value);
} catch {
loginError.innerText = "Chyba přihlášení";
}
};

window.logout = () => signOut(auth);
window.showActive = () => { currentView="active"; loadRides(); };
window.showHistory = () => { currentView="history"; loadRides(); };

onAuthStateChanged(auth, user=>{
if(user){
loginSection.classList.add("hidden");
adminSection.classList.remove("hidden");
loadRides();
loadDashboard();
}else{
loginSection.classList.remove("hidden");
adminSection.classList.add("hidden");
}
});

/* DASHBOARD */

async function loadDashboard(){
const snapshot = await getDocs(collection(db,"receipts"));
let todayTotal=0, monthTotal=0;
const now=new Date();

snapshot.forEach(docSnap=>{
const data=docSnap.data();
if(!data.date) return;
const date=new Date(data.date.seconds*1000);

if(date.toDateString()===now.toDateString())
todayTotal+=data.price||0;

if(date.getMonth()===now.getMonth() &&
date.getFullYear()===now.getFullYear())
monthTotal+=data.price||0;
});

document.getElementById("todayTotal").innerText = todayTotal+" Kč";
document.getElementById("monthTotal").innerText = monthTotal+" Kč";
}

/* PDF PROFESIONAL */

window.generateAdminPDF = function(ride){

const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

const date = new Date(ride.receiptDate?.seconds * 1000 || Date.now());

// HEADER
pdf.setFontSize(20);
pdf.setFont("helvetica","bold");
pdf.text("TAXI PLZEN",105,20,{align:"center"});

pdf.setFontSize(10);
pdf.setFont("helvetica","normal");
pdf.text("Taxi sluzba Plzen",105,28,{align:"center"});
pdf.text("Telefon: +420 XXX XXX XXX",105,34,{align:"center"});
pdf.text("Email: info@taxiplzen.cz",105,40,{align:"center"});

pdf.line(20,45,190,45);

// TITLE
pdf.setFontSize(14);
pdf.setFont("helvetica","bold");
pdf.text("UCTENKA",105,55,{align:"center"});

pdf.setFont("helvetica","normal");
pdf.setFontSize(11);

pdf.text("Cislo: "+ride.receiptNumber,20,70);
pdf.text("Datum: "+date.toLocaleDateString()+" "+date.toLocaleTimeString(),20,78);

pdf.line(20,85,190,85);

// CUSTOMER INFO
pdf.text("Odkud: "+ride.pickup,20,100);
pdf.text("Kam: "+ride.destination,20,110);
pdf.text("Telefon: "+(ride.phone||"-"),20,120);

pdf.line(20,130,190,130);

// TOTAL
pdf.setFontSize(14);
pdf.setFont("helvetica","bold");
pdf.text("Celkem:",20,150);
pdf.text((ride.estimatedPrice||0)+" KC",150,150);

pdf.line(20,160,190,160);

pdf.setFontSize(9);
pdf.setFont("helvetica","normal");
pdf.text("Dekuji za vyuziti nasi taxi sluzby.",105,175,{align:"center"});

pdf.save("uctenka_"+ride.receiptNumber+".pdf");
};

/* RESTUL CODULUI TĂU – IDENTIC */

async function generateReceiptNumber(){
const year=new Date().getFullYear();
const counterRef=doc(db,"counters","receipts_"+year);

return await runTransaction(db,async(transaction)=>{
const counterDoc=await transaction.get(counterRef);
let newNumber=1;
if(counterDoc.exists())
newNumber=counterDoc.data().lastNumber+1;

transaction.set(counterRef,{lastNumber:newNumber},{merge:true});
return `${year}-${String(newNumber).padStart(4,"0")}`;
});
}

async function completeRide(ride){
const receiptNumber=await generateReceiptNumber();
const receiptDate=new Date();

await updateDoc(doc(db,"rides",ride.id),{
status:"completed",
receiptNumber,
receiptDate
});

await addDoc(collection(db,"receipts"),{
receiptNumber,
date:receiptDate,
pickup:ride.pickup,
destination:ride.destination,
distance:ride.distance,
price:ride.estimatedPrice||0,
phone:ride.phone||""
});

alert("Účtenka vytvořena: "+receiptNumber);
loadDashboard();
}

window.exportMonthly = async function(){

const monthValue = document.getElementById("exportMonth").value;
if(!monthValue){
alert("Vyberte měsíc.");
return;
}

const [year,month] = monthValue.split("-");
const snapshot = await getDocs(collection(db,"receipts"));

let csv = "Číslo;Datum;Odkud;Kam;Cena;Telefon\n";

snapshot.forEach(docSnap=>{
const data = docSnap.data();
if(!data.date) return;

const date = new Date(data.date.seconds*1000);

if(date.getFullYear()==year && (date.getMonth()+1)==parseInt(month)){
csv += `${data.receiptNumber};${date.toLocaleDateString()};${data.pickup};${data.destination};${data.price};${data.phone}\n`;
}
});

const blob = new Blob([csv],{type:"text/csv"});
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = `export_${monthValue}.csv`;
a.click();
};

function loadRides(){
const ridesQuery = query(
  collection(db,"rides"),
  orderBy("createdAt","desc")
);

onSnapshot(ridesQuery, snapshot=>{

ridesList.innerHTML="";

snapshot.forEach(docSnap=>{
const ride={id:docSnap.id,...docSnap.data()};

if(currentView==="active" &&
(ride.status==="completed"||ride.status==="rejected"||ride.status==="cancelled")) return;

if(currentView==="history" &&
(ride.status==="new"||ride.status==="confirmed"||ride.status==="arrived")) return;

const rideDiv=document.createElement("div");
rideDiv.className="bg-gray-700 p-4 rounded";

rideDiv.innerHTML=`
<p><strong>Odkud:</strong> ${ride.pickup}</p>
<p><strong>Kam:</strong> ${ride.destination}</p>
<p><strong>Telefon:</strong> ${ride.phone || "-"}</p>
<p><strong>Status:</strong> ${ride.status}</p>

${ride.status==="completed" && ride.receiptDate ? `
<p class="text-gray-300">
<strong>Dokončeno:</strong> 
${new Date(ride.receiptDate.seconds * 1000).toLocaleString("cs-CZ")}
</p>
` : ""}

${ride.eta ? `<p><strong>ETA:</strong> ${ride.eta} min</p>` : ""}
`;

if(ride.receiptNumber){
const receiptBtn=document.createElement("button");
receiptBtn.className="mt-3 bg-green-600 px-4 py-2 rounded";
receiptBtn.innerText="📄 Účtenka "+ride.receiptNumber;
receiptBtn.onclick=()=>generateAdminPDF(ride);
rideDiv.appendChild(receiptBtn);
}

/* NEW */
if(currentView==="active" && ride.status==="new"){

  rideSound.play().catch(()=>{});
  
const etaInput=document.createElement("input");
etaInput.type="number";
etaInput.placeholder="Minuty";
etaInput.className="mt-3 p-2 w-20 text-black rounded mr-2";

const confirmBtn=document.createElement("button");
confirmBtn.innerText="Potvrdit";
confirmBtn.className="mt-3 bg-green-600 px-4 py-2 rounded mr-2";
confirmBtn.onclick=()=>{
rideSound.pause();
rideSound.currentTime = 0;

updateDoc(doc(db,"rides",ride.id),{
status:"confirmed",
eta:parseInt(etaInput.value)||5
});
};

const rejectBtn=document.createElement("button");
rejectBtn.innerText="Odmítnout";
rejectBtn.className="mt-3 bg-red-600 px-4 py-2 rounded";
rejectBtn.onclick=()=>{
rideSound.pause();
rideSound.currentTime = 0;

updateDoc(doc(db,"rides",ride.id),{status:"rejected"});
};

rideDiv.appendChild(etaInput);
rideDiv.appendChild(confirmBtn);
rideDiv.appendChild(rejectBtn);
}

/* CONFIRMED */
if(currentView==="active" && ride.status==="confirmed"){
const arrivedBtn=document.createElement("button");
arrivedBtn.innerText="Řidič přijel";
arrivedBtn.className="mt-3 bg-blue-600 px-4 py-2 rounded";
arrivedBtn.onclick=()=>{
updateDoc(doc(db,"rides",ride.id),{status:"arrived"});
};

rideDiv.appendChild(arrivedBtn);
}

if(currentView==="active" && ride.status==="arrived"){
const startBtn=document.createElement("button");
startBtn.innerText="Zahájit jízdu";
startBtn.className="mt-3 bg-yellow-500 text-black px-4 py-2 rounded mr-2";
startBtn.onclick=()=>{

updateDoc(doc(db,"rides",ride.id),{status:"in_progress"});

/* deschide Google Maps automat */
const url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(ride.destination);
window.open(url,"_blank");

};

rideDiv.appendChild(startBtn);
}

if(currentView==="active" && ride.status==="in_progress"){
const finishBtn=document.createElement("button");
finishBtn.innerText="Dokončit";
finishBtn.className="mt-3 bg-green-600 px-4 py-2 rounded";
finishBtn.onclick=()=>{
showPrice(ride.estimatedPrice || 0);
completeRide(ride);
};
rideDiv.appendChild(finishBtn);
}

ridesList.appendChild(rideDiv);
});
});
}

  function showPrice(price){

const popup = document.getElementById("pricePopup");
const text = document.getElementById("priceText");

text.classList.remove("price-zoom");
void text.offsetWidth; 
text.classList.add("price-zoom");

text.innerText = price + " Kč";

popup.classList.remove("hidden");

popup.onclick = ()=>{
popup.classList.add("hidden");
};

  }
  
</script>
</body>
</html>
