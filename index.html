<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Taxi Plzeň</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

<h1 class="text-2xl font-bold mb-6">Admin Panel - Taxi Plzeň</h1>

<div id="loginSection" class="max-w-md space-y-4">
<input id="email" type="email" placeholder="Email"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">
<input id="password" type="password" placeholder="Password"
class="w-full p-3 rounded bg-gray-800 border border-gray-700">
<button onclick="login()"
class="w-full bg-yellow-500 text-black font-bold py-3 rounded">
Přihlásit se
</button>
<p id="loginError" class="text-red-400"></p>
</div>

<div id="adminSection" class="hidden">

<div class="flex gap-4 mb-6">
<button onclick="showActive()"
class="bg-yellow-500 text-black px-4 py-2 rounded">
Aktivní jízdy
</button>
<button onclick="showHistory()"
class="bg-gray-700 px-4 py-2 rounded">
Historie
</button>
<button onclick="logout()"
class="bg-red-500 px-4 py-2 rounded ml-auto">
Odhlásit se
</button>
</div>

<div id="ridesList" class="space-y-4"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCSapx5d9v_fxpPBzuOfnH66lvQoQ8H-6E",
authDomain: "taxi-kristian.firebaseapp.com",
projectId: "taxi-kristian",
storageBucket: "taxi-kristian.firebasestorage.app",
messagingSenderId: "872925880546",
appId: "1:872925880546:web:12da74898c90a0155b7ebb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentView = "active";

window.login = async function() {
try {
await signInWithEmailAndPassword(auth,
document.getElementById("email").value,
document.getElementById("password").value);
} catch {
document.getElementById("loginError").innerText = "Chyba přihlášení";
}
};

window.logout = function() { signOut(auth); };
window.showActive = function() { currentView = "active"; loadRides(); };
window.showHistory = function() { currentView = "history"; loadRides(); };

onAuthStateChanged(auth, user => {
if(user){
document.getElementById("loginSection").classList.add("hidden");
document.getElementById("adminSection").classList.remove("hidden");
loadRides();
}else{
document.getElementById("loginSection").classList.remove("hidden");
document.getElementById("adminSection").classList.add("hidden");
}
});

async function generateReceiptNumber() {

const year = new Date().getFullYear();
const counterRef = doc(db, "counters", "receipts_" + year);

return await runTransaction(db, async (transaction) => {

const counterDoc = await transaction.get(counterRef);

let newNumber = 1;

if(counterDoc.exists()){
newNumber = counterDoc.data().lastNumber + 1;
}

transaction.set(counterRef, { lastNumber: newNumber }, { merge: true });

return `${year}-${String(newNumber).padStart(4,"0")}`;

});
}

function loadRides() {

onSnapshot(collection(db,"rides"), snapshot => {

const ridesList = document.getElementById("ridesList");
ridesList.innerHTML = "";

let ridesArray = [];

snapshot.forEach(docSnap => {
ridesArray.push({ id: docSnap.id, ...docSnap.data() });
});

ridesArray.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

ridesArray.forEach(ride => {

if(currentView==="active" &&
(ride.status==="completed"||ride.status==="rejected"||ride.status==="cancelled")) return;

if(currentView==="history" &&
(ride.status==="new"||ride.status==="confirmed")) return;

const rideDiv=document.createElement("div");
rideDiv.className="bg-gray-700 p-4 rounded";

rideDiv.innerHTML=`
<p><strong>Odkud:</strong> ${ride.pickup}</p>
<p><strong>Kam:</strong> ${ride.destination}</p>
<p><strong>Telefon:</strong> ${ride.phone}</p>
<p><strong>Status:</strong> ${ride.status}</p>
${ride.receiptNumber ? `<p class="text-green-400 mt-2"><strong>Účtenka:</strong> ${ride.receiptNumber}</p>`:""}
`;

if(currentView==="active" && ride.status==="confirmed"){

const finishBtn=document.createElement("button");
finishBtn.innerText="Dokončit";
finishBtn.className="mt-3 bg-green-600 px-4 py-2 rounded";

finishBtn.onclick=async()=>{

const receiptNumber=await generateReceiptNumber();

await updateDoc(doc(db,"rides",ride.id),{
status:"completed",
receiptNumber:receiptNumber,
receiptDate:new Date(),
company:{
name:"Nicolae Cristian",
ico:"06928391",
address:"Komenskeho 1075/77, Plzen",
phone:"+420 777 842 870",
note:"Neplátce DPH"
}
});

};

rideDiv.appendChild(finishBtn);
}

ridesList.appendChild(rideDiv);

});

});
}

</script>

</body>
</html>
